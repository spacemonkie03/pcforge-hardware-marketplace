services:
  postgres:
    image: postgres:16-alpine
    container_name: pc-postgres
    restart: always
    environment:
      POSTGRES_USER: pc_user
      POSTGRES_PASSWORD: pc_pass
      POSTGRES_DB: pc_hardware
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pc_user -d pc_hardware"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pc-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: pc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: pc-backend
    restart: always
    volumes:
      - ./uploads:/app/uploads
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: pc_user
      DB_PASS: pc_pass
      DB_NAME: pc_hardware
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_NODE: http://elasticsearch:9200
      ES_INDEX: products
      JWT_SECRET: supersecretjwt
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/products', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: pc-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  nginx:
    build: ./nginx
    container_name: pc-nginx
    restart: always
    ports:
      - "8080:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  pgdata:
