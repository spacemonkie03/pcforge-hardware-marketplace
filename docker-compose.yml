services:
  postgres:
    image: postgres:16-alpine
    container_name: pc-postgres
    restart: always
    environment:
      POSTGRES_USER: pc_user
      POSTGRES_PASSWORD: pc_pass
      POSTGRES_DB: pc_hardware
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: pc-redis
    restart: always
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: pc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"

  backend:
    build: ./backend
    container_name: pc-backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: pc_user
      DB_PASS: pc_pass
      DB_NAME: pc_hardware
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_NODE: http://elasticsearch:9200
      ES_INDEX: products
      JWT_SECRET: supersecretjwt
    depends_on:
      - postgres
      - redis
      - elasticsearch

  frontend:
    build: ./frontend
    container_name: pc-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: pc-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata: